# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: <%= ENV.fetch("DB_ADAPTER", "sqlite3") %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  host: <%= ENV.fetch("DB_HOST", nil) %>
  port: <%= ENV.fetch("DB_PORT", nil) %>
  username: <%= ENV.fetch("DB_USERNAME", nil) %>
  password: <%= ENV.fetch("DB_PASSWORD", nil) %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? "shelfarr_development" : "storage/development.sqlite3" %>
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? "shelfarr_development_queue" : "storage/development_queue.sqlite3" %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? "shelfarr_development_cable" : "storage/development_cable.sqlite3" %>
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? "shelfarr_test" : "storage/test.sqlite3" %>
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? "shelfarr_test_queue" : "storage/test_queue.sqlite3" %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? "shelfarr_test_cable" : "storage/test_cable.sqlite3" %>
    migrations_paths: db/cable_migrate


# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? ENV.fetch("DB_DATABASE", "shelfarr_production") : "storage/production.sqlite3" %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? ENV.fetch("DB_CACHE_DATABASE", "shelfarr_production_cache") : "storage/production_cache.sqlite3" %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? ENV.fetch("DB_QUEUE_DATABASE", "shelfarr_production_queue") : "storage/production_queue.sqlite3" %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DB_ADAPTER", "sqlite3") == "postgresql" ? ENV.fetch("DB_CABLE_DATABASE", "shelfarr_production_cable") : "storage/production_cable.sqlite3" %>
    migrations_paths: db/cable_migrate
